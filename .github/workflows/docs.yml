name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/workflow-engine/src/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/workflow-engine/src/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter workflow-engine-docs build

      # Commented-out wrangler deploy step. Note: Requires CLOUDFLARE_API_TOKEN and Cloudflare Pages account setup.
      # - name: Deploy to Cloudflare Pages
      #   run: pnpm --filter workflow-engine-docs run cf-deploy
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
